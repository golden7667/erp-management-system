{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In | Smart College ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:linear-gradient(135deg,#120822 0%,#251044 100%);}
        .login-card-container {width:100%;max-width:440px;padding:20px;}
        .login-card {background:rgba(25,14,46,0.85);backdrop-filter:blur(16px);border:1px solid rgba(99,102,241,0.1);border-radius:16px;padding:40px;box-shadow:0 20px 40px -15px rgba(0,0,0,0.5);}
        .form-control-custom {background:rgba(0,0,0,0.2)!important;border:1px solid rgba(255,255,255,0.08)!important;color:#f8fafc!important;border-radius:10px!important;padding:12px 16px 12px 42px!important;transition:all 0.3s ease!important;}
        .form-control-custom:focus {border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,0.15)!important;}
        .input-icon-container {position:relative;}
        .input-icon-container i {position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:0.95rem;pointer-events:none;}
        .btn-primary-custom {background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;color:white;padding:12px;border-radius:10px;font-weight:600;font-size:0.95rem;width:100%;transition:opacity 0.2s ease;}
        .btn-primary-custom:hover {opacity:0.9;}
        .brand-logo-center {display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;}
        .logo-icon {width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;box-shadow:0 4px 10px rgba(99,102,241,0.3);}
        .logo-text {font-size:1.35rem;font-weight:800;letter-spacing:-0.5px;color:#f8fafc;}
        .logo-text span {color:#6366f1;}
        .errorlist {list-style:none;padding:0;margin-bottom:16px;color:#f43f5e;font-size:0.85rem;text-align:center;}
    </style>
</head>
<body>
    <div class="login-card-container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags %}{{ message.tags }}{% else %}info{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        <div class="login-card">
            <div class="brand-logo-center">
                <div class="logo-icon"><i class="fa-solid fa-user-shield"></i></div>
                <span class="logo-text">Smart<span>ERP</span></span>
            </div>
            <h3 class="text-center mb-1" style="font-weight:700;font-size:1.3rem;color:#fff;">Admin Portal Sign‑In</h3>
            <p class="text-muted text-center mb-4" style="font-size:0.85rem;">Manage the ERP system.</p>
            <form method="post" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted" style="font-size:0.85rem;font-weight:500;">Username</label>
                    <div class="input-icon-container">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="username" id="username-field" class="form-control form-control-custom" required placeholder="Enter username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted" style="font-size:0.85rem;font-weight:500;">Password</label>
                    <div class="input-icon-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="password-field" class="form-control form-control-custom" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom mb-3"><i class="fa-solid fa-right-to-bracket"></i> Login to Admin</button>
            </form>
            <div class="mt-4 p-3 rounded" onclick="fillDemo('admin', 'admin123')" style="background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.2); font-size: 0.8rem; text-align: center; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(99, 102, 241, 0.15)'" onmouseout="this.style.background='rgba(99, 102, 241, 0.08)'">
                <span class="text-muted"><i class="fa-solid fa-wand-magic-sparkles"></i> Click to Auto-Fill Demo:</span><br>
                <span class="text-white">Username: <strong>admin</strong></span><br>
                <span class="text-white">Password: <strong>admin123</strong></span>
            </div>
        </div>
    </div>
    <script>
        function fillDemo(user, pass) {
            document.getElementById('username-field').value = user;
            document.getElementById('password-field').value = pass;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
